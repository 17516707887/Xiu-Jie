
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 生活助手AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header {
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            color: #495057;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .tool-list {
            flex: 1;
            overflow-y: auto;
        }

        .tool-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tool-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .tool-item .tool-name {
            font-weight: bold;
            color: #495057;
        }

        .tool-item .tool-desc {
            font-size: 0.8rem;
            color: #868e96;
            margin-top: 4px;
        }

        .sidebar-footer {
            margin-top: 20px;
        }

        .command-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #495057;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e9ecef;
        }

        .command-btn:hover {
            background: #e9ecef;
        }

        .command-btn.clear {
            background: #fff3f3;
            color: #dc3545;
            border-color: #dc3545;
        }

        .command-btn.clear:hover {
            background: #dc3545;
            color: white;
        }

        /* 主聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            color: #495057;
        }

        .chat-header h1 span {
            background: #e9ecef;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 10px;
            color: #868e96;
        }

        .status {
            display: flex;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #40c057;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* 消息列表 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #495057;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 4px;
            opacity: 0.7;
        }

        .message.user .message-time {
            text-align: right;
            color: white;
        }

        .message.assistant .message-time {
            color: #868e96;
        }

        .tool-badge {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-top: 4px;
            color: #495057;
        }

        /* 输入区域 */
        .input-area {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            background: white;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #message-input:focus {
            border-color: #667eea;
        }

        #send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #667eea;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:hover {
            background: #764ba2;
            transform: scale(1.1);
        }

        #send-btn:disabled {
            background: #ced4da;
            cursor: not-allowed;
            transform: none;
        }

        .suggestions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            padding: 6px 12px;
            background: #f1f3f5;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #495057;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #dee2e6;
        }

        .suggestion-chip:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #adb5bd;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🛠️ 可用工具</h2>
            </div>
            <div class="tool-list" id="tool-list">
                <!-- 工具列表会动态加载 -->
                <div class="tool-item">
                    <div class="tool-name">加载中...</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="command-btn" onclick="loadHistory()">📜 查看历史</button>
                <button class="command-btn" onclick="showHelp()">❓ 帮助</button>
                <button class="command-btn clear" onclick="clearMemory()">🧹 清空记忆</button>
            </div>
        </div>

        <!-- 主聊天区域 -->
        <div class="chat-area">
            <div class="chat-header">
                <h1>
                    生活助手AI Agent
                    <span>完整版</span>
                </h1>
                <div class="status">
                    <div class="status-dot"></div>
                    <span>在线</span>
                </div>
            </div>

            <!-- 消息列表 -->
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-content">
                        你好！我是你的生活助手，可以帮你：
                        🌤️ 查天气、📦 算快递费、🛒 管理购物清单、📅 查日期、✈️ 出行建议
                        <div class="message-time">现在</div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="输入你的问题..." autocomplete="off">
                    <button id="send-btn" onclick="sendMessage()">📤</button>
                </div>
                <div class="suggestions">
                    <span class="suggestion-chip" onclick="useSuggestion('上海天气')">🌤️ 上海天气</span>
                    <span class="suggestion-chip" onclick="useSuggestion('计算快递费 3kg 500km')">📦 快递费 3kg 500km</span>
                    <span class="suggestion-chip" onclick="useSuggestion('添加苹果')">🛒 添加苹果</span>
                    <span class="suggestion-chip" onclick="useSuggestion('今天星期几')">📅 今天星期几</span>
                    <span class="suggestion-chip" onclick="useSuggestion('去上海带2kg行李300km需要准备什么')">✈️ 出行建议</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API基础URL
        const API_BASE = 'http://localhost:5000/api';
        
        // 消息列表元素
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-btn');
        const toolList = document.getElementById('tool-list');

        // 是否正在等待响应
        let isLoading = false;

        // 页面加载时获取工具列表
        window.onload = function() {
            loadTools();
            // 回车发送消息
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !isLoading) {
                    sendMessage();
                }
            });
        };

        // 加载工具列表
        async function loadTools() {
            try {
                const response = await fetch(`${API_BASE}/tools`);
                const data = await response.json();
                
                if (data.success) {
                    const tools = data.tools.list;
                    const cities = data.tools.cities.slice(0, 5).join('、');
                    
                    let html = '';
                    tools.forEach(tool => {
                        let desc = '';
                        if (tool === 'get_weather') desc = '查询城市天气';
                        else if (tool === 'calculate_express_fee') desc = '计算快递费';
                        else if (tool === 'add_shopping_item') desc = '添加购物项';
                        else if (tool === 'get_shopping_list') desc = '查看清单';
                        else if (tool === 'remove_shopping_item') desc = '移除商品';
                        else if (tool === 'clear_shopping_list') desc = '清空清单';
                        else if (tool === 'get_date_info') desc = '日期查询';
                        else if (tool === 'get_travel_preparation') desc = '出行建议';
                        
                        html += `
                            <div class="tool-item" onclick="useSuggestion('${getExample(tool)}')">
                                <div class="tool-name">${tool}</div>
                                <div class="tool-desc">${desc}</div>
                            </div>
                        `;
                    });
                    
                    html += `<div class="tool-item" style="margin-top:10px; background:#e9ecef;">
                        <div class="tool-name">📍 支持城市</div>
                        <div class="tool-desc">${cities}...</div>
                    </div>`;
                    
                    toolList.innerHTML = html;
                }
            } catch (error) {
                console.error('加载工具失败:', error);
            }
        }

        // 获取工具示例
        function getExample(tool) {
            const examples = {
                'get_weather': '上海天气',
                'calculate_express_fee': '计算快递费 3kg 500km',
                'add_shopping_item': '添加苹果',
                'get_shopping_list': '查看清单',
                'remove_shopping_item': '移除苹果',
                'clear_shopping_list': '清空清单',
                'get_date_info': '今天星期几',
                'get_travel_preparation': '去上海带2kg行李300km需要准备什么'
            };
            return examples[tool] || tool;
        }

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // 清空输入框
            messageInput.value = '';
            
            // 添加用户消息到界面
            addMessage('user', message);
            
            // 显示正在输入
            showTypingIndicator();
            
            // 禁用输入
            isLoading = true;
            sendButton.disabled = true;
            messageInput.disabled = true;

            try {
                // 调用后端API
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // 移除正在输入指示
                removeTypingIndicator();
                
                if (data.success) {
                    // 添加助手回复
                    addMessage('assistant', data.response);
                } else {
                    addMessage('assistant', '❌ ' + (data.error || '出错了，请重试'));
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '❌ 网络错误，请检查后端服务是否运行');
                console.error('Error:', error);
            } finally {
                // 恢复输入
                isLoading = false;
                sendButton.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        // 添加消息到界面
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${content.replace(/\n/g, '<br>')}
                    <div class="message-time">${timeStr}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 显示正在输入指示器
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typing-indicator';
            indicator.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 移除正在输入指示器
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // 使用建议输入
        function useSuggestion(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        // 查看历史
        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/history`);
                const data = await response.json();
                
                if (data.success) {
                    const history = data.history;
                    if (history.length === 0) {
                        addMessage('assistant', '📭 暂无对话历史');
                        return;
                    }
                    
                    let historyText = '📜 **对话历史**\n\n';
                    history.forEach((item, index) => {
                        historyText += `[${item.timestamp?.split('T')[0] || '未知时间'}]\n`;
                        historyText += `👤 用户: ${item.user}\n`;
                        historyText += `🤖 助手: ${item.assistant}\n`;
                        if (item.tool) historyText += `🛠️ 工具: ${item.tool}\n`;
                        historyText += '\n';
                    });
                    
                    addMessage('assistant', historyText);
                }
            } catch (error) {
                addMessage('assistant', '❌ 获取历史失败');
            }
        }

        // 清空记忆
        async function clearMemory() {
            if (!confirm('确定要清空所有对话记忆吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/clear`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    // 清空消息列表，只保留欢迎消息
                    messagesContainer.innerHTML = `
                        <div class="message assistant">
                            <div class="message-content">
                                你好！我是你的生活助手，可以帮你：
                                🌤️ 查天气、📦 算快递费、🛒 管理购物清单、📅 查日期、✈️ 出行建议
                                <div class="message-time">现在</div>
                            </div>
                        </div>
                    `;
                    addMessage('assistant', data.message);
                }
            } catch (error) {
                addMessage('assistant', '❌ 清空记忆失败');
            }
        }

        // 显示帮助
        async function showHelp() {
            try {
                const response = await fetch(`${API_BASE}/help`);
                const data = await response.json();
                
                if (data.success) {
                    addMessage('assistant', data.help);
                }
            } catch (error) {
                addMessage('assistant', '❌ 获取帮助失败');
            }
        }
    </script>
</body>
</html>
